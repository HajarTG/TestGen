services:
  postgres:
    image: postgres:16-alpine
    container_name: testgen_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - testgen_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: testgen_redis
    restart: unless-stopped
    networks:
      - testgen_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: testgen_qdrant
    restart: unless-stopped
    networks:
      - testgen_net
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: testgen_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    networks:
      - testgen_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - results_data:/app/results
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    container_name: testgen_celery
    restart: unless-stopped
    env_file: .env
    networks:
      - testgen_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - results_data:/app/results
    command: python -m celery -A app.celery_app.celery_config worker --loglevel=info --concurrency=4 -Q testgen

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: testgen_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - testgen_net
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: testgen_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    networks:
      - testgen_net
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'

  grafana:
    image: grafana/grafana:latest
    container_name: testgen_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    networks:
      - testgen_net
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  postgres_data:
  qdrant_data:
  uploads_data:
  results_data:
  prometheus_data:
  grafana_data:

networks:
  testgen_net:
    driver: bridge
